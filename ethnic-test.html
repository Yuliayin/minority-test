      "土家族":{festival:"赶年",time:"农历腊月二十九（公历1-2月）",location:"湖南、湖北",tags:"摆手舞、哭嫁",color:"#8F6B4C"},
      "哈尼族":{festival:"苦扎扎",time:"农历六月（公历6-7月）",location:"云南红河",tags:"梯田、长街宴",color:"#6B8E4A"},
      "哈萨克族":{festival:"纳吾鲁孜节",time:"春分日（公历3月21日）",location:"新疆",tags:"草原、冬不拉",color:"#4A7B8C"},
      "傣族":{festival:"泼水节",time:"4月13-15日（傣历六月新年）",location:"云南西双版纳",tags:"水、孔雀舞",color:"#2E8B57"},
      "黎族":{festival:"三月三",time:"农历三月初三（公历4月）",location:"海南",tags:"船形屋、织锦",color:"#B55A30"},
      "傈僳族":{festival:"阔时节",time:"农历十二月（公历12-1月）",location:"云南怒江",tags:"刀杆、多声部",color:"#4F6D7A"},
      "佤族":{festival:"木鼓节",time:"4月10-12日左右",location:"云南临沧",tags:"剽牛、黑红图腾",color:"#A0522D"},
      "畲族":{festival:"三月三",time:"农历三月初三（公历4月）",location:"福建、浙江",tags:"凤凰装、山歌",color:"#5E4B5C"},
      "高山族":{festival:"丰年祭",time:"7-8月",location:"台湾",tags:"海洋、小米祭",color:"#3F7F7F"},
      "拉祜族":{festival:"葫芦节",time:"农历十月（公历11月）",location:"云南澜沧",tags:"葫芦笙、慢生活",color:"#6B5B3A"},
      "水族":{festival:"端节",time:"农历八月（水历年终，公历9-10月）",location:"贵州三都",tags:"水书、马尾绣",color:"#4A6B8A"},
      "东乡族":{festival:"古尔邦节",time:"伊斯兰历12月10日",location:"甘肃",tags:"花儿、手抓",color:"#8B7D6B"},
      "纳西族":{festival:"三朵节",time:"农历二月初八（公历3月）",location:"云南丽江",tags:"东巴文、雪山",color:"#5B7B8A"},
      "景颇族":{festival:"目瑙纵歌",time:"农历正月十五（公历2-3月）",location:"云南德宏",tags:"刀舞、万人齐舞",color:"#8A5B4B"},
      "柯尔克孜族":{festival:"诺鲁孜节",time:"春分（公历3月21日）",location:"新疆",tags:"史诗《玛纳斯》",color:"#3A6B6B"},
      "土族":{festival:"纳顿节",time:"农历七月（公历8-9月）",location:"青海",tags:"转山、轮子秋",color:"#C4A35A"},
      "达斡尔族":{festival:"斡包节",time:"公历6月28日",location:"内蒙古、黑龙江",tags:"曲棍球、萨满",color:"#5A6B4A"},
      "仫佬族":{festival:"依饭节",time:"立冬后（公历11月）",location:"广西罗城",tags:"舞草龙",color:"#6B8B5A"},
      "羌族":{festival:"羌历年",time:"农历十月初一（公历10-11月）",location:"四川阿坝",tags:"碉楼、白石崇拜",color:"#8B6B5B"},
      "布朗族":{festival:"桑康节",time:"4月中旬（傣历新年）",location:"云南西双版纳",tags:"茶山、赕佛",color:"#4B6E4A"},
      "撒拉族":{festival:"古尔邦节",time:"伊斯兰历12月10日",location:"青海循化",tags:"黄河、篱笆楼",color:"#7B8B5B"},
      "毛南族":{festival:"分龙节",time:"夏至后（公历6月）",location:"广西环江",tags:"傩面、花竹帽",color:"#5B7A5B"},
      "仡佬族":{festival:"吃新节",time:"农历七月（公历8-9月）",location:"贵州",tags:"丹砂、傩戏",color:"#9B6B4A"},
      "锡伯族":{festival:"西迁节",time:"农历四月十八（公历5-6月）",location:"新疆察布查尔",tags:"射箭、大饼",color:"#5B6B8B"},
      "阿昌族":{festival:"阿露窝罗节",time:"3月20日左右",location:"云南德宏",tags:"户撒刀、对歌",color:"#7B6B5A"},
      "普米族":{festival:"吾昔节",time:"农历十二月（公历1月）",location:"云南兰坪",tags:"羊皮鼓、森林",color:"#5B7B6B"},
      "塔吉克族":{festival:"肖公巴哈尔节",time:"春分（公历3月21日）",location:"新疆塔县",tags:"鹰笛、高原",color:"#4B5B7B"},
      "怒族":{festival:"仙女节",time:"农历三月十五（公历4月）",location:"云南贡山",tags:"鲜花、岩洞祭",color:"#6B5B4B"},
      "乌孜别克族":{festival:"古尔邦节",time:"伊斯兰历12月10日",location:"新疆",tags:"手鼓、庭院",color:"#5B4B6B"},
      "俄罗斯族":{festival:"复活节",time:"4月（东正教历）",location:"新疆、内蒙古",tags:"手风琴、列巴",color:"#4B6B8B"},
      "鄂温克族":{festival:"瑟宾节",time:"6月18日",location:"内蒙古呼伦贝尔",tags:"驯鹿、撮罗子",color:"#3B5B4B"},
      "德昂族":{festival:"浇花节",time:"4月中旬",location:"云南德宏",tags:"酸茶、银腰带",color:"#4B5B3B"},
      "保安族":{festival:"古尔邦节",time:"伊斯兰历12月10日",location:"甘肃积石山",tags:"保安腰刀",color:"#6B5B5B"},
      "裕固族":{festival:"正月大会",time:"农历正月（公历1-2月）",location:"甘肃肃南",tags:"红缨帽、天鹅琴",color:"#8B5B4B"},
      "京族":{festival:"哈节",time:"农历六月初十或八月初十（公历7月/9月）",location:"广西防城港",tags:"独弦琴、渔猎",color:"#3B6B7B"},
      "塔塔尔族":{festival:"撒班节",time:"6月20日左右",location:"新疆",tags:"手风琴、蜂蜜酒",color:"#5B4B4B"},
      "独龙族":{festival:"卡雀哇节",time:"农历腊月（公历1月）",location:"云南贡山",tags:"文面、剽牛祭天",color:"#4B4B5B"},
      "鄂伦春族":{festival:"篝火节",time:"6月18日",location:"内蒙古、黑龙江",tags:"桦皮船、狩猎",color:"#4B5B4B"},
      "赫哲族":{festival:"乌日贡节",time:"6月",location:"黑龙江",tags:"伊玛堪、鱼皮衣",color:"#3B4B6B"},
      "门巴族":{festival:"曲科节",time:"藏历四月（公历5-6月）",location:"西藏墨脱",tags:"木碗、竹编",color:"#5B4B5B"},
      "珞巴族":{festival:"昂德林节",time:"藏历十二月（公历1-2月）",location:"西藏米林",tags:"弓箭、森林",color:"#4B5B4B"},
      "基诺族":{festival:"特懋克节",time:"2月6-8日",location:"云南景洪",tags:"太阳鼓、大鼓舞",color:"#6B4B4B"}
    };

    let currentQuestion = 0;
    const totalQuestions = 20;
    let userChoices = new Array(totalQuestions).fill(-1);
    let inviterChoices = null;

    const testPage = document.getElementById('testPage');
    const resultPage = document.getElementById('resultPage');
    const comparePage = document.getElementById('comparePage');
    const progressFill = document.getElementById('progressFill');
    const qCounter = document.getElementById('qCounter');
    const qText = document.getElementById('qText');
    const optionsContainer = document.getElementById('optionsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    function parseInviterFromURL() {
      const params = new URLSearchParams(window.location.search);
      const ref = params.get('ref');
      if (ref) {
        try {
          const decoded = atob(ref);
          const arr = JSON.parse(decoded);
          if (Array.isArray(arr) && arr.length === totalQuestions) return arr;
        } catch (e) {}
      }
      return null;
    }

    function encodeChoices(choices) {
      return btoa(JSON.stringify(choices));
    }

    function getTopNation(choices) {
      const score = {};
      choices.forEach((optIdx, qIdx) => {
        if (optIdx === -1) return;
        const nations = optionNationMap[qIdx][optIdx];
        nations.forEach(n => { score[n] = (score[n] || 0) + 1; });
      });
      let maxScore = -1, topNation = null;
      for (let [nation, s] of Object.entries(score)) {
        if (s > maxScore || (s === maxScore && nation < topNation)) {
          maxScore = s; topNation = nation;
        }
      }
      return topNation || "蒙古族";
    }

    function getIdentityTag(choices) {
      const envCount = {A:0,B:0,C:0,D:0}, landCount = {A:0,B:0,C:0,D:0};
      for(let i=0;i<4;i++) if(choices[i]>=0) envCount[String.fromCharCode(65+choices[i])]++;
      for(let i=7;i<10;i++) if(choices[i]>=0) landCount[String.fromCharCode(65+choices[i])]++;
      const maxEnv = Object.keys(envCount).reduce((a,b)=>envCount[a]>=envCount[b]?a:b);
      const maxLand = Object.keys(landCount).reduce((a,b)=>landCount[a]>=landCount[b]?a:b);
      const envWords = {A:"追风的",B:"听雨的",C:"踏雪的",D:"逐浪的"};
      const landWords = {A:"远行者",B:"守望者",C:"守林人",D:"探险家"};  // 将“转山者”改为“远行者”
      return (envWords[maxEnv]||"") + (landWords[maxLand]||"行者");
    }

    function getCompareScene(meNation, partnerNation, meTag, partnerTag) {
      if (meNation === partnerNation) return `两个${meNation}灵魂相遇，默契得不需要言语。`;
      const scenes = [
        `一个向往${meNation}的${meTag}，一个心属${partnerNation}的${partnerTag}，旅途注定充满惊喜与碰撞。`,
        `${meTag}与${partnerTag}的搭配，要么互相嫌弃，要么互补得刚刚好。`
      ];
      return scenes[Math.floor(Math.random()*scenes.length)];
    }

    function getSimilarNations(mainNation) {
      const all = Object.keys(nationProfiles);
      const mainTags = nationProfiles[mainNation]?.tags || "";
      return all.filter(n=>n!==mainNation).sort((a,b)=>{
        const aMatch = (nationProfiles[a]?.tags||"").split("、").filter(t=>mainTags.includes(t)).length;
        const bMatch = (nationProfiles[b]?.tags||"").split("、").filter(t=>mainTags.includes(t)).length;
        return bMatch - aMatch;
      }).slice(0,4);
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      qCounter.textContent = `第 ${currentQuestion+1} / ${totalQuestions} 题`;
      qText.textContent = q.text;
      progressFill.style.width = ((currentQuestion+1)/totalQuestions*100)+"%";
      optionsContainer.innerHTML = "";
      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn' + (userChoices[currentQuestion] === idx ? ' selected' : '');
        btn.innerHTML = `<span class="option-letter">${String.fromCharCode(65+idx)}</span>${opt}`;
        btn.addEventListener('click', ()=> {
          userChoices[currentQuestion] = idx;
          renderQuestion();
        });
        optionsContainer.appendChild(btn);
      });
      prevBtn.disabled = currentQuestion === 0;
      nextBtn.disabled = userChoices[currentQuestion] === -1;
      nextBtn.textContent = currentQuestion === totalQuestions-1 ? '查看结果 →' : '下一题 →';
    }

    function goNext() {
      if (userChoices[currentQuestion] === -1) return;
      if (currentQuestion < totalQuestions-1) {
        currentQuestion++;
        renderQuestion();
      } else {
        if (inviterChoices) {
          showComparePage(userChoices, inviterChoices);
        } else {
          showResult();
        }
      }
    }

    function goPrev() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    }

    function showResult() {
      const topNation = getTopNation(userChoices);
      const profile = nationProfiles[topNation] || nationProfiles["蒙古族"];
      const tag = getIdentityTag(userChoices);
      const similar = getSimilarNations(topNation);
      const mainColor = profile.color || "#8B3A3A";

      testPage.classList.add('hidden');
      resultPage.classList.remove('hidden');
      comparePage.classList.add('hidden');
      resultPage.style.backgroundColor = mainColor;
      resultPage.style.color = 'white';

      const similarHTML = similar.map(n=>{
        const p = nationProfiles[n];
        return `<span class="similar-chip">${n} · ${p.festival} ${p.time}</span>`;
      }).join('');

      resultPage.innerHTML = `
        <div style="padding:0.5rem 0;">
          <div style="font-size:1rem; opacity:0.8;">你的灵魂住着一座${profile.tags.split("、")[0]}的远方</div>
          <div class="identity-tag">${topNation}</div>
          <div style="font-size:1.4rem; font-weight:500; margin-bottom:0.5rem;">${tag}</div>
          <div class="soul-line">“${profile.tags}，这便是你与${topNation}的缘分。”</div>
        </div>
        <div class="poster-card">
          <div style="font-weight:500; font-size:1.2rem;">${profile.tags.replace(/、/g,' · ')}</div>
        </div>
        <div class="festival-card">
          <div class="festival-name">${profile.festival}</div>
          <div class="festival-date">📅 ${profile.time}</div>
          <div>📍 ${profile.location}</div>
          <div style="margin-top:0.8rem; font-size:0.9rem;">✨ 建议提前规划，沉浸式体验当地文化。</div>
        </div>
        <div style="font-weight:600; margin-top:1rem;">你还会喜欢这些地方</div>
        <div class="similar-peoples">${similarHTML}</div>
        <div class="share-area">
          <button class="btn-light" id="shareResultBtn">📤 生成我的缘分海报（截图分享）</button>
          <button class="btn-outline" id="inviteCompareBtn">👥 邀请朋友测契合度</button>
        </div>
        <div style="margin-top:1rem; font-size:0.8rem; opacity:0.7; text-align:center;">点击邀请，复制链接发给朋友，测测你们适不适合一起旅行</div>
      `;

      document.getElementById('shareResultBtn').addEventListener('click', ()=>{
        alert('请截图当前页面分享至朋友圈！');
      });
      document.getElementById('inviteCompareBtn').addEventListener('click', ()=>{
        const encoded = encodeChoices(userChoices);
        const shareUrl = `${window.location.origin}${window.location.pathname}?ref=${encoded}`;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(shareUrl).then(()=> alert('链接已复制！发给朋友，TA完成测试后即可看到契合度。'));
        } else {
          prompt('复制此链接发给朋友：', shareUrl);
        }
      });
    }

    function showComparePage(myChoices, partnerChoices) {
      const myNation = getTopNation(myChoices);
      const partnerNation = getTopNation(partnerChoices);
      const myTag = getIdentityTag(myChoices);
      const partnerTag = getIdentityTag(partnerChoices);
      const sameCount = myChoices.reduce((acc, val, idx) => acc + (val === partnerChoices[idx] ? 1 : 0), 0);
      const matchPercent = Math.round((sameCount / totalQuestions) * 100);
      let titleEmoji = '🌋', titleText = '小心火山爆发';
      if (matchPercent >= 80) { titleEmoji = '🎉'; titleText = '命中注定的旅行搭子！'; }
      else if (matchPercent >= 50) { titleEmoji = '⚖️'; titleText = '可以一起出发，但需要一点磨合'; }
      else if (matchPercent >= 30) { titleEmoji = '🌋'; titleText = '一起旅游？小心火山爆发！'; }
      else { titleEmoji = '🆘'; titleText = '建议分开旅行，友谊更长久'; }

      const sceneText = getCompareScene(myNation, partnerNation, myTag, partnerTag);

      testPage.classList.add('hidden');
      resultPage.classList.add('hidden');
      comparePage.classList.remove('hidden');
      comparePage.innerHTML = `
        <div class="compare-header">${titleEmoji} ${titleText}</div>
        <div class="match-percent" style="text-align:center;">${matchPercent}% <span style="font-size:1rem;">契合度</span></div>
        <div class="compare-row">
          <div class="compare-person"><strong>${myTag}</strong><br>${myNation}</div>
          <div style="font-size:2rem;">⚡</div>
          <div class="compare-person"><strong>${partnerTag}</strong><br>${partnerNation}</div>
        </div>
        <div style="background:#f0eae0; border-radius:1rem; padding:1rem; margin:1rem 0;">
          <div class="dimension-bar"><span>环境偏好</span><div class="bar-bg"><div class="bar-fill" style="width:${matchPercent}%"></div></div></div>
          <div class="dimension-bar"><span>社交方式</span><div class="bar-bg"><div class="bar-fill" style="width:${matchPercent}%"></div></div></div>
          <div class="dimension-bar"><span>景观触动</span><div class="bar-bg"><div class="bar-fill" style="width:${matchPercent}%"></div></div></div>
          <div class="dimension-bar"><span>美食期待</span><div class="bar-bg"><div class="bar-fill" style="width:${matchPercent}%"></div></div></div>
        </div>
        <div style="font-style:italic; background:rgba(0,0,0,0.03); padding:1rem; border-radius:1rem;">🎬 ${sceneText}</div>
        <button class="btn-light" style="margin-top:1.5rem; width:100%;" id="inviteAnotherBtn">👥 再拉一个朋友，三人成行</button>
      `;
      document.getElementById('inviteAnotherBtn').addEventListener('click', ()=>{
        const encoded = encodeChoices(myChoices);
        const shareUrl = `${window.location.origin}${window.location.pathname}?ref=${encoded}`;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(shareUrl).then(()=> alert('链接已复制！发给新朋友继续对比。'));
        } else {
          prompt('复制链接：', shareUrl);
        }
      });
    }

    function init() {
      inviterChoices = parseInviterFromURL();
      renderQuestion();
      prevBtn.addEventListener('click', goPrev);
      nextBtn.addEventListener('click', goNext);
    }

    init();
  })();
</script>
</body>
</html>
